apis:
  - aid: predicthq:predicthq-api
    name: PredictHQ API
    description: >-
      The PredictHQ REST API provides programmatic access to global real-world
      event data and demand intelligence. It exposes endpoints for the Events
      API, Features API, Forecasts API, Beam API, Saved Locations API,
      Predicted Impact Area API, Places API, and Loop API. The API is served
      from https://api.predicthq.com/v1/ and uses Bearer token authentication
      with API access tokens.
    humanURL: https://www.predicthq.com/
